<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Parts Intelligence Report — Proposals</title>
<link rel="stylesheet" href="../../../system/pb-system.css" />
<meta name="ext-resource-dependency" content="../../../system/logos/pb-logo-light.svg" data-resource-id="pbLogoLight" />
<meta name="ext-resource-dependency" content="../../../system/logos/pb-logo-dark.svg" data-resource-id="pbLogoDark" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  body { font-family: var(--font-sans); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>

<template id="__bundler_thumbnail" data-bg-color="#f0eee9">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#f0eee9"/>
    <!-- Three paper artboards in a row -->
    <g>
      <rect x="80"  y="160" width="320" height="480" rx="12" fill="#fff" stroke="#d5d7da" stroke-width="2"/>
      <rect x="440" y="160" width="320" height="480" rx="12" fill="#fff" stroke="#d5d7da" stroke-width="2"/>
      <rect x="800" y="160" width="320" height="480" rx="12" fill="#fff" stroke="#d5d7da" stroke-width="2"/>
      <!-- Orange PBExpress strip -->
      <rect x="80"  y="160" width="320" height="24" fill="#EF5A24"/>
      <rect x="440" y="160" width="320" height="24" fill="#EF5A24"/>
      <rect x="800" y="160" width="320" height="24" fill="#EF5A24"/>
      <!-- Title lines in navy -->
      <rect x="112" y="240" width="200" height="20" rx="4" fill="#002857"/>
      <rect x="112" y="272" width="160" height="20" rx="4" fill="#002857"/>
      <rect x="472" y="240" width="200" height="20" rx="4" fill="#002857"/>
      <rect x="472" y="272" width="140" height="20" rx="4" fill="#002857"/>
      <rect x="832" y="240" width="200" height="20" rx="4" fill="#002857"/>
      <rect x="832" y="272" width="180" height="20" rx="4" fill="#002857"/>
      <!-- Body rules -->
      <g fill="#e9eaeb">
        <rect x="112" y="320" width="256" height="8"/>
        <rect x="112" y="340" width="240" height="8"/>
        <rect x="112" y="360" width="256" height="8"/>
        <rect x="112" y="380" width="200" height="8"/>
        <rect x="472" y="320" width="256" height="8"/>
        <rect x="472" y="340" width="240" height="8"/>
        <rect x="472" y="360" width="256" height="8"/>
        <rect x="472" y="380" width="200" height="8"/>
        <rect x="832" y="320" width="256" height="8"/>
        <rect x="832" y="340" width="240" height="8"/>
        <rect x="832" y="360" width="256" height="8"/>
        <rect x="832" y="380" width="200" height="8"/>
      </g>
      <!-- Blue accent strip / metrics -->
      <rect x="112" y="440" width="256" height="32" rx="6" fill="#0C70E8"/>
      <rect x="472" y="440" width="256" height="32" rx="6" fill="#0C70E8"/>
      <rect x="832" y="440" width="256" height="32" rx="6" fill="#0C70E8"/>
    </g>
  </svg>
</template>

<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="report-content.jsx"></script>
<script type="text/babel" src="variation-1-memo.jsx"></script>
<script type="text/babel" src="variation-2-magazine.jsx"></script>
<script type="text/babel" src="variation-3-dashboard.jsx"></script>

<script type="text/babel">
  const { Variation1, Variation2, Variation3 } = window;

  function App() {
    const W = 1200;
    return (
      <DesignCanvas>
        <DCSection id="intel-report"
          title="Parts Intelligence Report"
          subtitle="Three directions for the individual report page (/blog)">
          <DCArtboard id="v1" label="1 · Analyst Memo — single column, sticky TOC" width={W} height={3600}>
            <Variation1 />
          </DCArtboard>
          <DCArtboard id="v2" label="2 · Magazine Briefing — two-column editorial" width={W} height={3600}>
            <Variation2 />
          </DCArtboard>
          <DCArtboard id="v3" label="3 · Intelligence Dashboard — data-forward" width={W} height={3600}>
            <Variation3 />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
